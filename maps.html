<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Maps | Cem Öztürk</title>

<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  min-height:100%;
}

body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont,
               "Segoe UI", Helvetica, Arial, sans-serif;
  background:#111;
  color:#fff;
}

.wrap{
  max-width:1400px;
  margin:0 auto;
  padding:40px clamp(24px, 4vw, 60px);
}

.back{
  display:inline-block;
  font-size:14px;
  letter-spacing:.08em;
  color:rgba(255,255,255,0.5);
  text-decoration:none;
  margin-bottom:20px;
  transition:color .2s;
}
.back:hover{ color:rgba(255,255,255,0.9); }

h1{
  font-size:clamp(28px, 4vw, 42px);
  font-weight:400;
  letter-spacing:.04em;
  color:rgba(255,255,255,0.82);
  margin-bottom:40px;
}

.masonry{
  column-count:4;
  column-gap:20px;
}
.masonry img{
  width:100%;
  height:auto;
  margin-bottom:20px;
  break-inside:avoid;
  display:block;
  opacity:0;
  transform:translateY(30px);
  filter:blur(4px);
  transition:opacity .65s ease, transform .65s ease, filter .8s ease;
}
.masonry img.visible{
  opacity:1;
  transform:translateY(0);
  filter:blur(0);
}

@media(max-width:1200px){ .masonry{column-count:3;} }
@media(max-width:900px){  .masonry{column-count:2;} }
@media(max-width:500px){  .masonry{column-count:1;} }

.empty{
  color:rgba(255,255,255,0.4);
  font-size:16px;
  letter-spacing:.04em;
}

@media(prefers-reduced-motion:reduce){
  .masonry img{
    transition:none;
    opacity:1;
    transform:none;
    filter:none;
  }
}

.curtain{
  position:fixed; inset:0; z-index:100; background:#0a0a0a;
  clip-path:circle(150% at 50% 50%);
  animation:burstReveal .55s cubic-bezier(.4,0,.2,1) .05s forwards;
}
.curtain.closing{
  animation:burstClose .5s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes burstReveal{ from{clip-path:circle(150% at 50% 50%)} to{clip-path:circle(0% at 50% 50%)} }
@keyframes burstClose{ from{clip-path:circle(0% at 50% 50%)} to{clip-path:circle(150% at 50% 50%)} }
</style>
</head>

<body>
<div class="curtain"></div>
<div class="wrap">
  <a class="back" href="./index.html">&larr; HOME</a>
  <h1>MAPS BY CEM</h1>
  <div id="gallery" class="masonry"></div>
  <p id="empty" class="empty" style="display:none;">Coming soon.</p>
</div>

<script>
(function(){
  const gallery = document.getElementById("gallery");
  const emptyMsg = document.getElementById("empty");
  const exts = ["jpg","jpeg","png"];
  let loaded = 0;
  let total = 0;

  for(let i = 1; i <= 60; i++){
    total++;
    const img = document.createElement("img");
    img.loading = "lazy";
    let k = 0;
    const tryNext = () => {
      if(k >= exts.length){
        img.remove();
        total--;
        if(total === 0) emptyMsg.style.display = "";
        return;
      }
      img.src = `./assets/map${i}.${exts[k++]}`;
    };
    img.onerror = tryNext;
    img.onload = () => { loaded++; };
    tryNext();
    gallery.appendChild(img);
  }

  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){
        e.target.classList.add("visible");
        io.unobserve(e.target);
      }
    });
  }, {threshold: .1});

  new MutationObserver(() => {
    gallery.querySelectorAll("img:not(.visible)").forEach((img, i) => {
      img.style.transitionDelay = `${(i % 8) * 60}ms`;
      io.observe(img);
    });
  }).observe(gallery, {childList: true});
})();
(function(){
  const curtain = document.querySelector('.curtain');
  document.querySelectorAll('a.back').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const href = a.href;
      curtain.classList.add('closing');
      setTimeout(() => { window.location = href; }, 520);
    });
  });
})();
</script>
</body>
</html>
