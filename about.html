<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>About | Cem Öztürk</title>

<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  min-height:100%;
}

body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont,
               "Segoe UI", Helvetica, Arial, sans-serif;
  background:#111;
  color:#fff;
}

.wrap{
  max-width:800px;
  margin:0 auto;
  padding:40px clamp(24px, 4vw, 60px);
}

.back{
  display:inline-block;
  font-size:14px;
  letter-spacing:.08em;
  color:rgba(255,255,255,0.5);
  text-decoration:none;
  margin-bottom:20px;
  transition:color .2s;
}
.back:hover{ color:rgba(255,255,255,0.9); }

h1{
  font-size:clamp(28px, 4vw, 42px);
  font-weight:400;
  letter-spacing:.04em;
  color:rgba(255,255,255,0.82);
  margin-bottom:40px;
}

.bio{
  font-size:18px;
  line-height:1.7;
  color:rgba(255,255,255,0.7);
  max-width:600px;
}

.bio p{
  margin-bottom:20px;
}

/* entrance */
.bio, h1{
  opacity:0;
  transform:translateY(18px);
  animation:fadeUp .6s ease forwards;
}
h1{ animation-delay:.1s; }
.bio{ animation-delay:.25s; }

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>
<div class="wrap">
  <a class="back" href="./index.html">&larr; HOME</a>
  <h1>ABOUT CEM</h1>
  <div class="bio">
    <p>Designer, researcher, and event coordinator.</p>
    <p>More details coming soon.</p>
  </div>
</div>
</body>
</html>
