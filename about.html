<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>About | CEM ÖZTÜRK</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet" />

<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  min-height:100%;
}

body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont,
               "Segoe UI", Helvetica, Arial, sans-serif;
  background:#0a0a0a;
  color:#fff;
}

.bg{
  position:fixed; inset:0; z-index:-1;
  background:url("./assets/background.jpg") center/cover no-repeat;
}
.bg::after{
  content:""; position:absolute; inset:0;
  background:rgba(0,0,0,0.75);
}

.wrap{
  max-width:800px;
  margin:0 auto;
  padding:40px clamp(24px, 4vw, 60px);
}

.back{
  display:inline-block;
  font-size:14px;
  letter-spacing:.08em;
  color:rgba(255,255,255,0.5);
  text-decoration:none;
  margin-bottom:20px;
  transition:color .2s;
}
.back:hover{ color:rgba(255,255,255,0.9); }

h1{
  font-family:'Josefin Sans', sans-serif;
  font-size:clamp(28px, 4vw, 42px);
  font-weight:200;
  letter-spacing:.06em;
  color:rgba(255,255,255,0.82);
  margin-bottom:40px;
}

.bio{
  font-size:18px;
  line-height:1.7;
  color:rgba(255,255,255,0.7);
  max-width:600px;
}

.bio p{
  margin-bottom:20px;
}

/* entrance */
.bio, h1{
  opacity:0;
  transform:translateY(18px);
  animation:fadeUp .6s ease forwards;
}
h1{ animation-delay:.1s; }
.bio{ animation-delay:.25s; }

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.curtain{
  position:fixed; inset:0; z-index:9999;
  background:#0a0a0a;
}
.curtain.enter{
  animation:curtainOut .45s cubic-bezier(.4,0,.2,1) .05s both;
}
.curtain.exit{
  animation:curtainIn .4s cubic-bezier(.4,0,.2,1) both;
}
@keyframes curtainIn{  from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes curtainOut{ from{transform:translateX(0)} to{transform:translateX(-100%)} }
.curtain.exit-left{
  animation:curtainInLeft .4s cubic-bezier(.4,0,.2,1) both;
}
@keyframes curtainInLeft{ from{transform:translateX(-100%)} to{transform:translateX(0)} }
</style>
</head>

<body>
<div class="bg"></div>
<div class="curtain enter"></div>
<div class="wrap">
  <a class="back" href="./index.html">&larr; HOME</a>
  <h1>ABOUT CEM</h1>
  <div class="bio">
    <p>Designer, researcher, and event coordinator.</p>
    <p>More details coming soon.</p>
  </div>
</div>

<script>
(function(){
  document.querySelectorAll('a.back').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const href = a.href;
      const c = document.createElement('div');
      c.className = 'curtain exit-left';
      document.body.appendChild(c);
      sessionStorage.setItem('nav-back','1');
      setTimeout(() => { window.location = href; }, 420);
    });
  });
})();
</script>
</body>
</html>
