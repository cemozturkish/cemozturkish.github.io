<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  overflow:hidden;
}

body{
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color:#fff;
  background:#0a0a0a;
}

/* full-bleed background with slow Ken Burns drift */
.bg{
  position:fixed;
  inset:-20px;
  z-index:0;
  background-image:url("./assets/background.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  animation:bgDrift 25s ease-in-out infinite alternate;
}

@keyframes bgDrift{
  0%  { transform:scale(1.0)  translate(0, 0); }
  100%{ transform:scale(1.06) translate(-8px, -4px); }
}

/* layered overlay — gradient for depth */
.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(0,0,0,0.70) 0%, rgba(0,0,0,0.40) 50%, rgba(0,0,0,0.60) 100%);
}

/* navigation container — right-aligned, vertically centered */
.nav{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-end;
  height:100vh;
  padding-right:clamp(28px, 4vw, 60px);
  padding-top:12vh;
  gap:0;
}


/* category links */
.nav a{
  position:relative;
  display:block;
  font-family:'Josefin Sans', sans-serif;
  font-size:clamp(18px, 2.6vw, 30px);
  font-weight:200;
  color:rgba(255,255,255,0.55);
  text-decoration:none;
  letter-spacing:.06em;
  padding:10px 0;
  text-align:right;
  transform-origin:right center;
  transition:color .4s cubic-bezier(.25,.1,.25,1),
             transform .4s cubic-bezier(.25,.1,.25,1);
}

.nav a:hover{
  color:rgba(255,255,255,0.95);
  transform:scale(1.08);
}

/* entrance animation */
.nav a{
  opacity:0;
  animation:fadeIn .8s cubic-bezier(.16,1,.3,1) forwards;
}
.nav a:nth-child(1){ animation-delay:.15s; }
.nav a:nth-child(2){ animation-delay:.25s; }
.nav a:nth-child(3){ animation-delay:.35s; }
.nav a:nth-child(4){ animation-delay:.45s; }
.nav a:nth-child(5){ animation-delay:.55s; }
.nav a:nth-child(6){ animation-delay:.65s; }
.nav a:nth-child(7){ animation-delay:.75s; }
.nav a:nth-child(8){ animation-delay:.85s; }

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateX(30px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* mobile tweaks */
@media(max-width:600px){
  .nav{
    padding-right:28px;
  }
  .nav a{
    padding:8px 0;
  }
}

@media(prefers-reduced-motion:reduce){
  .bg{ animation:none; }
  .nav a{
    animation:none;
    opacity:1;
    transform:none;
  }
}
/* clickable head zone — SVG path traced from background */
.contact-zone{
  position:fixed;
  inset:-20px;
  width:calc(100% + 40px);
  height:calc(100% + 40px);
  z-index:2;
  pointer-events:none;
  animation:bgDrift 25s ease-in-out infinite alternate;
}
.contact-zone path{
  cursor:pointer;
  pointer-events:auto;
  fill:transparent;
  transition:fill .3s ease;
}
.contact-zone path:hover{
  fill:rgba(0,0,0,0.15);
}

/* contact overlay panel */
.contact-panel{
  position:fixed;
  left:0; top:0;
  width:40%;
  height:100%;
  z-index:3;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding-left:clamp(28px, 4vw, 60px);
  transform:translateX(-100%);
  opacity:0;
  transition:transform .45s cubic-bezier(.25,.1,.25,1),
             opacity .45s cubic-bezier(.25,.1,.25,1);
  pointer-events:none;
}
.contact-panel.open{
  transform:translateX(0);
  opacity:1;
  pointer-events:auto;
}
.contact-panel a{
  display:block;
  font-family:'Josefin Sans', sans-serif;
  font-size:clamp(15px, 2vw, 22px);
  font-weight:200;
  color:rgba(255,255,255,0.6);
  text-decoration:none;
  letter-spacing:.06em;
  padding:8px 0;
  transition:color .3s ease;
}
.contact-panel a:hover{
  color:rgba(255,255,255,0.95);
}

@media(max-width:600px){
  .contact-panel{
    width:60%;
    padding-left:28px;
  }
}

/* page transition: curtain wipe */
.curtain{
  position:fixed; inset:0; z-index:9999;
  background:#0a0a0a;
}
.curtain.enter{
  animation:curtainOut .45s cubic-bezier(.4,0,.2,1) .05s both;
}
.curtain.enter-right{
  animation:curtainOutRight .45s cubic-bezier(.4,0,.2,1) .05s both;
}
.curtain.exit{
  animation:curtainIn .4s cubic-bezier(.4,0,.2,1) both;
}
@keyframes curtainIn{  from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes curtainOut{ from{transform:translateX(0)} to{transform:translateX(-100%)} }
@keyframes curtainOutRight{ from{transform:translateX(0)} to{transform:translateX(100%)} }

/* intro spotlight — darkens everything except the head, then fades */
.intro-spotlight{
  position:fixed;
  inset:-20px;
  width:calc(100% + 40px);
  height:calc(100% + 40px);
  z-index:1;
  pointer-events:none;
  animation:bgDrift 25s ease-in-out infinite alternate;
}
.intro-spotlight path{
  fill:rgba(0,0,0,0.70);
  animation:spotlightFade 3s ease-out 0.5s forwards;
}
@keyframes spotlightFade{
  to{ fill:rgba(0,0,0,0); }
}
</style>
</head>

<div id="curtain" class="curtain enter"></div>

<script>
(function(){
  var c = document.getElementById('curtain');
  if(sessionStorage.getItem('nav-back')){
    c.className = 'curtain enter-right';
    sessionStorage.removeItem('nav-back');
  }
  // contact panel toggle — clicking the head trace path
  var headZone = document.getElementById('headZone');
  var panel = document.getElementById('contactPanel');
  headZone.addEventListener('click', function(){ panel.classList.toggle('open'); });
  // close panel when clicking outside
  document.addEventListener('click', function(e){
    if(panel.classList.contains('open') && !panel.contains(e.target) && e.target !== headZone){
      panel.classList.remove('open');
    }
  });

  document.querySelectorAll('.nav a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const href = a.href;
      const c = document.createElement('div');
      c.className = 'curtain exit';
      document.body.appendChild(c);
      setTimeout(() => { window.location = href; }, 420);
    });
  });
})();
</script>
