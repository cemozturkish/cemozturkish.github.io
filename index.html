<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  overflow:hidden;
}

body{
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color:#fff;
  background:#0a0a0a;
}

/* full-bleed background with slow Ken Burns drift */
.bg{
  position:fixed;
  inset:-20px;
  z-index:0;
  background-image:url("./assets/background.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  animation:bgDrift 25s ease-in-out infinite alternate;
}

@keyframes bgDrift{
  0%  { transform:scale(1.0)  translate(0, 0); }
  100%{ transform:scale(1.06) translate(-8px, -4px); }
}

/* layered overlay — gradient for depth */
.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.55) 100%);
}

/* navigation container — right-aligned, vertically centered */
.nav{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-end;
  height:100vh;
  padding-right:clamp(28px, 4vw, 60px);
  padding-bottom:14vh;
  gap:0;
}


/* category links */
.nav a{
  position:relative;
  display:block;
  font-family:'Inter', system-ui, sans-serif;
  font-size:clamp(18px, 2.6vw, 30px);
  font-weight:200;
  color:rgba(255,255,255,0.55);
  text-decoration:none;
  letter-spacing:.10em;
  padding:10px 0;
  text-align:right;
  transform-origin:right center;
  transition:color .4s cubic-bezier(.25,.1,.25,1),
             letter-spacing .4s cubic-bezier(.25,.1,.25,1);
}

/* animated underline on hover */
.nav a::after{
  content:"";
  position:absolute;
  bottom:6px;
  right:0;
  width:0;
  height:1px;
  background:rgba(255,255,255,0.5);
  transition:width .4s cubic-bezier(.25,.1,.25,1);
}

.nav a:hover{
  color:rgba(255,255,255,0.95);
  letter-spacing:.14em;
}
.nav a:hover::after{
  width:100%;
}

/* entrance animation */
.nav a{
  opacity:0;
  transform:translateY(24px);
  animation:fadeUp .8s cubic-bezier(.16,1,.3,1) forwards;
}
.nav a:nth-child(1){ animation-delay:.15s; }
.nav a:nth-child(2){ animation-delay:.25s; }
.nav a:nth-child(3){ animation-delay:.35s; }
.nav a:nth-child(4){ animation-delay:.45s; }
.nav a:nth-child(5){ animation-delay:.55s; }
.nav a:nth-child(6){ animation-delay:.65s; }
.nav a:nth-child(7){ animation-delay:.75s; }
.nav a:nth-child(8){ animation-delay:.85s; }

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* mobile tweaks */
@media(max-width:600px){
  .nav{
    padding-right:28px;
  }
  .nav a{
    padding:8px 0;
  }
}

@media(prefers-reduced-motion:reduce){
  .bg{ animation:none; }
  .nav a{
    animation:none;
    opacity:1;
    transform:none;
  }
}
</style>
</head>
