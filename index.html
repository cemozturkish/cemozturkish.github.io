<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cem Öztürk</title>

<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  overflow:hidden;
}

body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont,
               "Segoe UI", Helvetica, Arial, sans-serif;
  color:#fff;
  background:#111;
}

/* full-bleed background */
.bg{
  position:fixed;
  inset:0;
  z-index:0;
  background-image:url("./assets/background.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* dark overlay for readability */
.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.52);
}

/* navigation container — left-aligned, vertically centered */
.nav{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  height:100vh;
  padding-left:clamp(40px, 8vw, 120px);
  gap:4px;
}

/* name / logo */
.nav-name{
  font-size:clamp(18px, 2.4vw, 28px);
  font-weight:300;
  letter-spacing:.12em;
  color:rgba(255,255,255,0.45);
  margin-bottom:32px;
  text-transform:uppercase;
}

/* category links */
.nav a{
  display:block;
  font-size:clamp(22px, 3.2vw, 38px);
  font-weight:400;
  color:rgba(255,255,255,0.72);
  text-decoration:none;
  letter-spacing:.05em;
  padding:8px 0;
  transition:color .22s ease, transform .22s ease, letter-spacing .22s ease;
  transform-origin:left center;
}
.nav a:hover{
  color:rgba(255,255,255,0.98);
  transform:translateX(12px);
  letter-spacing:.08em;
}

/* entrance animation */
.nav a,
.nav-name{
  opacity:0;
  transform:translateY(18px);
  animation:fadeUp .6s ease forwards;
}
.nav-name{ animation-delay:.1s; }
.nav a:nth-child(2){ animation-delay:.18s; }
.nav a:nth-child(3){ animation-delay:.26s; }
.nav a:nth-child(4){ animation-delay:.34s; }
.nav a:nth-child(5){ animation-delay:.42s; }
.nav a:nth-child(6){ animation-delay:.50s; }
.nav a:nth-child(7){ animation-delay:.58s; }
.nav a:nth-child(8){ animation-delay:.66s; }
.nav a:nth-child(9){ animation-delay:.74s; }
.nav a:nth-child(10){ animation-delay:.82s; }

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* mobile tweaks */
@media(max-width:600px){
  .nav{
    padding-left:28px;
    gap:2px;
  }
  .nav a{
    padding:6px 0;
  }
}
</style>
</head>

<body>
<div class="bg"></div>

<nav class="nav">
  <div class="nav-name">Cem Öztürk</div>
  <a href="./about.html">ABOUT CEM</a>
  <a href="./designs.html">DESIGNS BY CEM</a>
  <a href="./exhibitions.html">EXHIBITIONS BY CEM</a>
  <a href="./productions.html">PRODUCTIONS BY CEM</a>
  <a href="./ideas.html">IDEAS BY CEM</a>
  <a href="./projects.html">PROJECTS BY CEM</a>
  <a href="./events.html">EVENTS BY CEM</a>
  <a href="./maps.html">MAPS BY CEM</a>
</nav>

</body>
</html>
