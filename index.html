<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CEM ÖZTÜRK</title>

<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  overflow:hidden;
}

body{
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color:#fff;
  background:#0a0a0a;
}

/* full-bleed background with slow Ken Burns drift */
.bg{
  position:fixed;
  inset:-20px;
  z-index:0;
  background-image:url("./assets/background.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  animation:bgDrift 25s ease-in-out infinite alternate;
}

@keyframes bgDrift{
  0%  { transform:scale(1.0)  translate(0, 0); }
  100%{ transform:scale(1.06) translate(-8px, -4px); }
}

/* layered overlay — gradient for depth */
.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(0,0,0,0.70) 0%, rgba(0,0,0,0.40) 50%, rgba(0,0,0,0.60) 100%);
}

/* navigation container — right-aligned, vertically centered */
.nav{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-end;
  height:100vh;
  padding-right:clamp(28px, 4vw, 60px);
  padding-top:12vh;
  gap:0;
}


/* category links */
.nav a{
  position:relative;
  display:block;
  font-family:'Josefin Sans', sans-serif;
  font-size:clamp(18px, 2.6vw, 30px);
  font-weight:200;
  color:rgba(255,255,255,0.55);
  text-decoration:none;
  letter-spacing:.06em;
  padding:10px 0;
  text-align:right;
  transform-origin:right center;
  transition:color .4s cubic-bezier(.25,.1,.25,1),
             transform .4s cubic-bezier(.25,.1,.25,1);
}

.nav a:hover{
  color:rgba(255,255,255,0.95);
  transform:scale(1.08);
}

/* entrance animation */
.nav a{
  opacity:0;
  animation:fadeIn .8s cubic-bezier(.16,1,.3,1) forwards;
}
.nav a:nth-child(1){ animation-delay:.15s; }
.nav a:nth-child(2){ animation-delay:.25s; }
.nav a:nth-child(3){ animation-delay:.35s; }
.nav a:nth-child(4){ animation-delay:.45s; }
.nav a:nth-child(5){ animation-delay:.55s; }
.nav a:nth-child(6){ animation-delay:.65s; }
.nav a:nth-child(7){ animation-delay:.75s; }
.nav a:nth-child(8){ animation-delay:.85s; }

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateX(30px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* mobile tweaks */
@media(max-width:600px){
  .nav{
    padding-right:28px;
  }
  .nav a{
    padding:8px 0;
  }
}

@media(prefers-reduced-motion:reduce){
  .bg{ animation:none; }
  .nav a{
    animation:none;
    opacity:1;
    transform:none;
  }
}
/* clickable head zone — SVG path traced from background */
.contact-zone{
  position:fixed;
  inset:-20px;
  width:calc(100% + 40px);
  height:calc(100% + 40px);
  z-index:2;
  pointer-events:none;
  animation:bgDrift 25s ease-in-out infinite alternate;
}
.contact-zone path{
  cursor:pointer;
  pointer-events:auto;
  fill:transparent;
  transition:fill .3s ease;
}
.contact-zone path:hover,
.contact-zone path.active{
  fill:rgba(0,0,0,0.15);
}

/* contact buttons beside head */
.contact-panel{
  position:fixed;
  left:38%;
  top:50%;
  transform:translateY(-50%) translateX(12px);
  z-index:3;
  display:flex;
  flex-direction:column;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transition:opacity .4s ease, transform .4s ease;
}
.contact-panel.open{
  opacity:1;
  transform:translateY(-50%) translateX(0);
  pointer-events:auto;
}
.contact-panel a{
  display:block;
  font-family:'Josefin Sans', sans-serif;
  font-size:clamp(14px, 1.6vw, 20px);
  font-weight:200;
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  letter-spacing:.06em;
  padding:6px 0;
  transition:color .3s ease;
}
.contact-panel a:hover{
  color:rgba(255,255,255,1);
}

@media(max-width:600px){
  .contact-panel{
    width:60%;
    padding-left:28px;
  }
}

/* page transition: curtain wipe */
.curtain{
  position:fixed; inset:0; z-index:9999;
  background:#0a0a0a;
}
.curtain.enter{
  animation:curtainOut .45s cubic-bezier(.4,0,.2,1) .05s both;
}
.curtain.enter-right{
  animation:curtainOutRight .45s cubic-bezier(.4,0,.2,1) .05s both;
}
.curtain.exit{
  animation:curtainIn .4s cubic-bezier(.4,0,.2,1) both;
}
@keyframes curtainIn{  from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes curtainOut{ from{transform:translateX(0)} to{transform:translateX(-100%)} }
@keyframes curtainOutRight{ from{transform:translateX(0)} to{transform:translateX(100%)} }

/* intro spotlight — darkens everything except the head, then fades */
.intro-spotlight{
  position:fixed;
  inset:-20px;
  width:calc(100% + 40px);
  height:calc(100% + 40px);
  z-index:1;
  pointer-events:none;
  animation:bgDrift 25s ease-in-out infinite alternate;
}
.intro-spotlight path{
  animation:spotlightFade 4.5s ease-out 0.5s forwards;
}
@keyframes spotlightFade{
  to{ fill-opacity:0; }
}

/* section panel — slides in from right */
.section-panel{
  position:fixed;
  right:0; top:0;
  width:65%;
  height:100%;
  z-index:4;
  background:rgba(0,0,0,0.82);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  overflow-y:auto;
  transform:translateX(100%);
  opacity:0;
  transition:transform .45s cubic-bezier(.25,.1,.25,1),
             opacity .45s cubic-bezier(.25,.1,.25,1);
  pointer-events:none;
}
.section-panel.open{
  transform:translateX(0);
  opacity:1;
  pointer-events:auto;
}
.section-panel .panel-close{
  position:sticky;
  top:0;
  display:block;
  padding:20px clamp(24px, 4vw, 60px);
  font-size:14px;
  letter-spacing:.08em;
  color:rgba(255,255,255,0.5);
  text-decoration:none;
  cursor:pointer;
  background:transparent;
  border:none;
  font-family:inherit;
  transition:color .2s;
  z-index:1;
}
.section-panel .panel-close:hover{
  color:rgba(255,255,255,0.9);
}
.section-panel .panel-body{
  padding:0 clamp(24px, 4vw, 60px) 60px;
}
.section-panel .panel-body h1{
  font-family:'Josefin Sans', sans-serif;
  font-size:clamp(18px, 2.6vw, 30px);
  font-weight:200;
  letter-spacing:.06em;
  color:rgba(255,255,255,0.55);
  margin-bottom:40px;
  text-align:center;
}
.section-panel .panel-body .masonry{
  column-count:3;
  column-gap:20px;
}
.section-panel .panel-body .masonry img{
  width:100%;
  height:auto;
  margin-bottom:20px;
  break-inside:avoid;
  display:block;
  opacity:0;
  transform:translateY(30px);
  filter:blur(4px);
  transition:opacity .65s ease, transform .65s ease, filter .8s ease;
}
.section-panel .panel-body .masonry img.visible{
  opacity:0.9;
  transform:translateY(0);
  filter:blur(0);
}
.section-panel .panel-body .bio{
  font-size:18px;
  line-height:1.7;
  color:rgba(255,255,255,0.7);
  max-width:600px;
}
.section-panel .panel-body .bio p{
  margin-bottom:20px;
}
.section-panel .panel-body .empty{
  color:rgba(255,255,255,0.4);
  font-size:16px;
  letter-spacing:.04em;
}
@media(max-width:900px){
  .section-panel{ width:85%; }
  .section-panel .panel-body .masonry{ column-count:2; }
}
@media(max-width:500px){
  .section-panel{ width:100%; }
  .section-panel .panel-body .masonry{ column-count:1; }
}
</style>
</head>

<script>
(function(){
  var c = document.getElementById('curtain');
  if(sessionStorage.getItem('nav-back')){
    c.className = 'curtain enter-right';
    sessionStorage.removeItem('nav-back');
  }
  // contact panel toggle — clicking the head trace path
  var headZone = document.getElementById('headZone');
  var panel = document.getElementById('contactPanel');
  headZone.addEventListener('click', function(){ panel.classList.toggle('open'); headZone.classList.toggle('active'); });
  // close panel when clicking outside
  document.addEventListener('click', function(e){
    if(panel.classList.contains('open') && !panel.contains(e.target) && e.target !== headZone){
      panel.classList.remove('open');
      headZone.classList.remove('active');
    }
  });

  // section panel logic
  var secPanel = document.getElementById('sectionPanel');
  var secBody = document.getElementById('panelBody');
  var secClose = document.getElementById('panelClose');

  // page content definitions
  var pages = {
    'about.html': { title:'ABOUT', type:'bio', content:'<div class="bio"><p>Designer, researcher, and event coordinator.</p><p>More details coming soon.</p></div>' },
    'designs.html': { title:'DESIGNS', type:'gallery', prefix:'designer' },
    'exhibitions.html': { title:'EXHIBITIONS', type:'gallery', prefix:'exhibition' },
    'productions.html': { title:'PRODUCTIONS', type:'gallery', prefix:'production' },
    'projects.html': { title:'PROJECTS', type:'gallery', prefix:'project' },
    'events.html': { title:'EVENTS', type:'gallery', prefix:'events', header:'./assets/events.png' },
    'ideas.html': { title:'IDEAS', type:'gallery', prefix:'idea', header:'./assets/ideas.png' },
    'maps.html': { title:'MAPS', type:'gallery', prefix:'map', header:'./assets/maps.png' }
  };

  function openSection(page){
    var p = pages[page];
    if(!p) return;
    secBody.innerHTML = '';
    // title
    var h = document.createElement('h1');
    h.textContent = p.title;
    // header image for some pages
    if(p.header){
      var himg = document.createElement('img');
      himg.src = p.header;
      himg.alt = p.title;
      himg.style.cssText = 'display:block;margin:0 auto 40px;max-width:clamp(160px,22vw,280px);height:auto;opacity:0.9;';
      secBody.appendChild(himg);
    } else {
      secBody.appendChild(h);
    }
    if(p.type === 'bio'){
      secBody.insertAdjacentHTML('beforeend', p.content);
    } else {
      var gallery = document.createElement('div');
      gallery.className = 'masonry';
      secBody.appendChild(gallery);
      loadGallery(gallery, p.prefix);
    }
    secPanel.classList.add('open');
    secPanel.scrollTop = 0;
  }

  function loadGallery(gallery, prefix){
    var exts = ['jpg','jpeg','png'];
    for(var i = 1; i <= 60; i++){
      (function(i){
        var img = document.createElement('img');
        img.loading = 'lazy';
        var k = 0;
        var tryNext = function(){
          if(k >= exts.length){ img.remove(); return; }
          img.src = './assets/' + prefix + i + '.' + exts[k++];
        };
        img.onerror = tryNext;
        tryNext();
        gallery.appendChild(img);
      })(i);
    }
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          e.target.classList.add('visible');
          io.unobserve(e.target);
        }
      });
    }, {threshold:.1, root: secPanel});
    new MutationObserver(function(){
      gallery.querySelectorAll('img:not(.visible)').forEach(function(img, i){
        img.style.transitionDelay = (i % 8) * 60 + 'ms';
        io.observe(img);
      });
    }).observe(gallery, {childList:true});
  }

  function closeSection(){
    secPanel.classList.remove('open');
  }

  secClose.addEventListener('click', closeSection);

  document.querySelectorAll('.nav a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      var href = a.getAttribute('href');
      var page = href.replace('./','');
      openSection(page);
    });
  });

  // close section panel when clicking outside
  document.addEventListener('click', function(e){
    if(secPanel.classList.contains('open') && !secPanel.contains(e.target) && !e.target.closest('.nav')){
      closeSection();
    }
  });
})();
</script>
