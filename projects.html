<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Projects | CEM ÖZTÜRK</title>
<link rel="icon" type="image/png" href="./favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300&display=swap" rel="stylesheet" />

<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  min-height:100%;
}

body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont,
               "Segoe UI", Helvetica, Arial, sans-serif;
  background:#0a0a0a;
  color:#fff;
}

.bg{
  position:fixed; inset:0; z-index:-1;
  background:url("./assets/background.jpg") center/cover no-repeat;
}
.bg::after{
  content:""; position:absolute; inset:0;
  background:rgba(0,0,0,0.75);
}

.wrap{
  max-width:1400px;
  margin:0 auto;
  padding:40px clamp(24px, 4vw, 60px);
}

.back{
  display:inline-block;
  font-size:14px;
  letter-spacing:.08em;
  color:rgba(255,255,255,0.5);
  text-decoration:none;
  margin-bottom:20px;
  transition:color .2s;
}
.back:hover{ color:rgba(255,255,255,0.9); }

h1{
  font-family:'Josefin Sans', sans-serif;
  font-size:clamp(18px, 2.6vw, 30px);
  font-weight:200;
  letter-spacing:.06em;
  color:rgba(255,255,255,0.55);
  margin-bottom:40px;
  text-align:center;
}

.masonry{
  column-count:4;
  column-gap:20px;
}
.masonry img{
  width:100%;
  height:auto;
  margin-bottom:20px;
  break-inside:avoid;
  display:block;
  opacity:0;
  transform:translateY(30px);
  filter:blur(4px);
  transition:opacity .65s ease, transform .65s ease, filter .8s ease;
}
.masonry img.visible{
  opacity:1;
  transform:translateY(0);
  filter:blur(0);
}

@media(max-width:1200px){ .masonry{column-count:3;} }
@media(max-width:900px){  .masonry{column-count:2;} }
@media(max-width:500px){  .masonry{column-count:1;} }

@media(prefers-reduced-motion:reduce){
  .masonry img{
    transition:none;
    opacity:1;
    transform:none;
    filter:none;
  }
}

.curtain{
  position:fixed; inset:0; z-index:9999;
  background:#0a0a0a;
}
.curtain.enter{
  animation:curtainOut .45s cubic-bezier(.4,0,.2,1) .05s both;
}
.curtain.exit{
  animation:curtainIn .4s cubic-bezier(.4,0,.2,1) both;
}
@keyframes curtainIn{  from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes curtainOut{ from{transform:translateX(0)} to{transform:translateX(-100%)} }
.curtain.exit-left{
  animation:curtainInLeft .4s cubic-bezier(.4,0,.2,1) both;
}
@keyframes curtainInLeft{ from{transform:translateX(-100%)} to{transform:translateX(0)} }
</style>
</head>

<body>
<div class="bg"></div>
<div class="curtain enter"></div>
<div class="wrap">
  <a class="back" href="./index.html">&larr; HOME</a>
  <h1>PROJECTS</h1>
  <div id="gallery" class="masonry"></div>
</div>

<script>
(function(){
  const gallery = document.getElementById("gallery");
  const exts = ["jpg","jpeg","png"];

  for(let i = 1; i <= 60; i++){
    const img = document.createElement("img");
    img.loading = "lazy";
    let k = 0;
    const tryNext = () => {
      if(k >= exts.length){ img.remove(); return; }
      img.src = `./assets/project${i}.${exts[k++]}`;
    };
    img.onerror = tryNext;
    tryNext();
    gallery.appendChild(img);
  }

  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){
        e.target.classList.add("visible");
        io.unobserve(e.target);
      }
    });
  }, {threshold: .1});

  new MutationObserver(() => {
    gallery.querySelectorAll("img:not(.visible)").forEach((img, i) => {
      img.style.transitionDelay = `${(i % 8) * 60}ms`;
      io.observe(img);
    });
  }).observe(gallery, {childList: true});
})();
(function(){
  document.querySelectorAll('a.back').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const href = a.href;
      const c = document.createElement('div');
      c.className = 'curtain exit-left';
      document.body.appendChild(c);
      sessionStorage.setItem('nav-back','1');
      setTimeout(() => { window.location = href; }, 420);
    });
  });
})();
</script>
</body>
</html>
